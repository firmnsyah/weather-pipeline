version: 2
models:
  - name: dim_city
    columns:
      - name: city_key
        tests: [unique, not_null]
      - name: city_name
        tests: [not_null]
  - name: fact_weather_daily
    columns:
      - name: city_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_city')
                field: city_key
      - name: date_key
        tests: [not_null]
      - name: temp_max
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -20
                max_value: 55