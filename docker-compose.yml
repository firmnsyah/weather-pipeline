x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas pyarrow sqlalchemy psycopg2-binary python-dotenv dbt-postgres"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./:/opt/project
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:16
    container_name: weather_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname a --lastname b --role Admin --email a@b.com"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports: ["8080:8080"]
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  metabase:
    image: metabase/metabase:latest
    container_name: weather_metabase
    ports: ["3000:3000"]
    depends_on: [postgres]

volumes:
  pgdata: